<!--
  DockerGameInterface — One-Page Game Server Panel (Dummy Template)
  Namespace: tk.weslie.DockerGameInterface

  Pure HTML5 / CSS / Vanilla JS single-page app. No external dependencies (portable).
  Data is loaded via fetch() from the server API under "/api/".
  Login is done exclusively via a "Server Token".

  Expected API endpoints (all sent with header  Authorization: Bearer <token>):
    GET    /api/status                    -> { online, name, address, version, uptime, resources:{ram:{used,max}, cpu, cpuSample:{total,time}, disk:{used,max}} }
                                            (Ping is NOT taken from here — it is measured client-side, browser -> webserver.)
                                            (cpu is null; the CPU % is derived client-side from consecutive cpuSample counters.)
    POST   /api/start | /stop | /restart | /kill
    GET    /api/console?after=<seq>       -> { lines:[{seq,ts,text}], last:<seq> }
    POST   /api/command                   body: { command }
    GET    /api/backups                   -> [{ id, name, size, created, status }]
    POST   /api/backups                   (create backup)  -> { id }
    POST   /api/backups/<id>/restore
    GET    /api/backups/<id>/download      (file download)
    DELETE /api/backups/<id>

  Note: there is NO history endpoint. /api/status returns only the CURRENT
  usage; it is polled every 5 seconds and the RAM/CPU graphs are built
  client-side from those live samples (kept in memory during the session).

  The token is sent via Bearer header and kept in localStorage.
  If the API is unreachable, a clear error is shown and the session is
  terminated (forced logout) — there is no offline/demo fallback.
-->

<script>
"use strict";
/* =========================================================================
   tk.weslie.DockerGameInterface — Frontend Controller
   ========================================================================= */
const App = (() => {

  const API = "/api";
  const TOKEN_KEY = "dgi.token";
  let token = null;
  let consoleSeq = 0;               // last read line sequence
  let pingMs = null;                // locally measured round-trip time (browser -> webserver)
  const timers = [];

  // Client-side rolling history for the charts, filled from live /api/status
  // samples (there is no history endpoint). ~40 points ≈ 3.3 min at 5s cadence.
  const HISTORY_LEN = 40;
  const ramHistory = [];            // { used, max }
  const cpuHistory = [];            // number (%)

  // The API cannot compute a CPU % from a single one-shot Docker stat, so it
  // returns the raw cumulative counter { total: CPU-ns, time: unix-seconds }.
  // We cache the previous sample here and derive the % from its growth over the
  // elapsed time — all client-side, so the request stays stateless and fast.
  let prevCpuSample = null;

  // Turn the latest raw CPU sample into a percentage using the cached previous
  // one. Returns null while priming (first sample), when offline, on a counter
  // reset (container restart), or across a gap too large to be meaningful.
  function cpuPercentFrom(sample) {
    if (!sample || typeof sample.total !== "number") { prevCpuSample = null; return null; }
    const prev = prevCpuSample;
    prevCpuSample = sample;
    if (!prev) return null;                       // nothing to diff against yet
    const cpuDeltaNs = sample.total - prev.total; // CPU-ns consumed since last sample
    const wallDelta  = sample.time  - prev.time;  // seconds elapsed (Docker's own clock)
    if (cpuDeltaNs < 0 || wallDelta <= 0 || wallDelta > 300) return null;
    // cpuDeltaNs / (wallDelta * 1e9 ns) * 100  ==  cpuDeltaNs / wallDelta / 1e7.
    // total sums across all cores, so this can exceed 100 %, like `docker stats`.
    return Math.round(cpuDeltaNs / wallDelta / 1e7 * 10) / 10;
  }

  /* ---------------- HTTP helper ---------------- */
  async function api(path, { method = "GET", body } = {}) {
    const opt = {
      method,
      headers: { "Authorization": "Bearer " + token }
    };
    if (body !== undefined) {
      opt.headers["Content-Type"] = "application/json";
      opt.body = JSON.stringify(body);
    }
    let res;
    try {
      res = await fetch(API + path, opt);
    } catch {
      // Network-level failure => the API is unreachable.
      throw new Error("unreachable");
    }
    if (res.status === 401) { logout(); throw new Error("unauthorized"); }
    if (!res.ok) throw new Error("HTTP " + res.status);
    const ct = res.headers.get("content-type") || "";
    return ct.includes("application/json") ? res.json() : res.text();
  }

  /* ---------------- Toast ---------------- */
  function toast(msg, isErr = false) {
    const el = document.createElement("div");
    el.className = "toast" + (isErr ? " err" : "");
    el.textContent = msg;
    document.getElementById("toasts").appendChild(el);
    setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity .3s"; }, 3200);
    setTimeout(() => el.remove(), 3600);
  }

  /* =====================================================================
     LOGIN
     ===================================================================== */
  function initLogin() {
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const val = document.getElementById("token").value.trim();
      const err = document.getElementById("loginError");
      const btn = document.getElementById("loginBtn");
      err.textContent = "";
      if (!val) { err.textContent = "Please enter a token."; return; }
      btn.disabled = true; btn.textContent = "Checking…";
      token = val;
      try {
        // Validate token against the API
        await api("/status");
        localStorage.setItem(TOKEN_KEY, token);
        enterApp();
      } catch (ex) {
        token = null;
        if (ex.message === "unauthorized") {
          err.textContent = "Invalid server token.";
        } else if (ex.message === "unreachable") {
          err.textContent = "Server not reachable. Please try again later.";
        } else {
          err.textContent = "Login failed (" + ex.message + ").";
        }
      } finally {
        btn.disabled = false; btn.textContent = "Sign in";
      }
    });
  }

  function logout(reason = "") {
    localStorage.removeItem(TOKEN_KEY);
    token = null;
    timers.forEach(clearInterval); timers.length = 0;
    document.getElementById("app").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("token").value = "";
    document.getElementById("loginError").textContent = reason;
  }

  // Called when the API becomes unreachable during an active session:
  // show a clear message and terminate the session (forced logout).
  let _forcedOut = false;
  function forceLogout() {
    if (_forcedOut) return;           // avoid duplicate toasts from parallel polls
    _forcedOut = true;
    toast("Server not reachable — you have been signed out.", true);
    logout("Server not reachable — you have been signed out.");
  }

  /* =====================================================================
     APP INIT
     ===================================================================== */
  function enterApp() {
    _forcedOut = false;
    document.getElementById("loginError").textContent = "";
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    // Navigation
    document.querySelectorAll("#nav a").forEach(a =>
      a.addEventListener("click", () => showPage(a.dataset.page)));

    document.getElementById("logoutBtn").addEventListener("click", logout);

    // Console
    const send = () => sendCommand();
    document.getElementById("cmdSend").addEventListener("click", send);
    document.getElementById("cmdInput").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

    // Power buttons
    document.querySelectorAll("[data-action]").forEach(b =>
      b.addEventListener("click", () => power(b.dataset.action)));

    // Backups
    document.getElementById("createBackup").addEventListener("click", createBackup);

    // Reset live chart buffers for a fresh session
    ramHistory.length = 0; cpuHistory.length = 0; prevCpuSample = null;

    // Poll timers — current usage every 5s, console every 2s, ping every 3s
    timers.push(setInterval(loadStatus, 5000));
    timers.push(setInterval(loadConsole, 2000));
    timers.push(setInterval(measurePing, 3000));
    measurePing();

    refreshAll();
    showPage("system");
  }

  function refreshAll() {
    loadStatus();
    loadConsole(true);
    loadBackups();
  }

  function showPage(page) {
    document.querySelectorAll("#nav a").forEach(a => a.classList.toggle("active", a.dataset.page === page));
    document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
    document.getElementById("page-" + page).classList.remove("hidden");
  }

  /* =====================================================================
     STATUS + TILES
     ===================================================================== */
  async function loadStatus() {
    let s;
    try { s = await api("/status"); }
    catch (ex) { if (ex.message === "unreachable") forceLogout(); return; }

    document.getElementById("sysServerName").textContent = s.name || "Server";

    // Online status
    const dot = document.getElementById("sysDot");
    dot.className = "dot " + (s.online ? "online" : "offline");
    document.getElementById("sysStatusText").textContent = s.online ? "Online" : "Offline";

    // Tiles
    const r = s.resources || {};
    // Derive the CPU % client-side from the raw counter (see cpuPercentFrom).
    r.cpu = cpuPercentFrom(r.cpuSample);
    const ramTxt  = r.ram  ? `${r.ram.used} / ${r.ram.max} MB` : "—";
    const pingTxt = pingMs == null ? "—" : pingMs + " ms";
    const tiles = [
      { cls: "ping", label: "Ping",  value: pingTxt, icon: '<path d="M5 12.55a11 11 0 0 1 14 0M8.5 16a6 6 0 0 1 7 0M2 8.82a15 15 0 0 1 20 0"/><circle cx="12" cy="20" r="1"/>' },
      { cls: "ram",  label: "RAM",   value: ramTxt,  icon: '<rect x="3" y="8" width="18" height="9" rx="1"/><path d="M7 17v3M17 17v3M7 12v1M11 12v1M15 12v1"/>' },
      { cls: "cpu",  label: "CPU",   value: (r.cpu ?? "—") + " %", icon: '<rect x="7" y="7" width="10" height="10" rx="1"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/>' }
    ];
    document.getElementById("sysTiles").innerHTML = tiles.map(t => `
      <div class="tile">
        <div><div class="label">${t.label}</div><div class="value">${t.value}</div></div>
        <div class="icon ${t.cls}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${t.icon}</svg></div>
      </div>`).join("");

    // Record the current usage into the local rolling buffers and redraw.
    recordSample(r);
    renderCharts();
  }

  /* =====================================================================
     CLIENT-SIDE CHARTS
     Built purely from the live /api/status samples collected above —
     no data comes from the API history, only the current utilisation.
     ===================================================================== */
  function recordSample(r) {
    const ram = r.ram && typeof r.ram.used === "number"
      ? { used: r.ram.used, max: r.ram.max || 0 } : { used: 0, max: 0 };
    const cpu = typeof r.cpu === "number" ? r.cpu : 0;
    ramHistory.push(ram); cpuHistory.push(cpu);
    if (ramHistory.length > HISTORY_LEN) ramHistory.shift();
    if (cpuHistory.length > HISTORY_LEN) cpuHistory.shift();
  }

  function renderCharts() {
    const ramMax = ramHistory.reduce((m, p) => Math.max(m, p.max), 0) || 1;
    drawChart("ramChart", ramHistory.map(p => p.used), ramMax, "#4ade80");
    drawChart("cpuChart", cpuHistory, 100, "#29b6bd");
    const rl = ramHistory.at(-1), cl = cpuHistory.at(-1);
    if (rl != null) document.getElementById("ramNow").textContent = rl.used + " MB";
    if (cl != null) document.getElementById("cpuNow").textContent = cl + " %";
  }

  /* =====================================================================
     LOCAL PING
     Measured client-side: the round-trip time of a lightweight request
     from the browser to this webserver (no API "ping" value is used).
     ===================================================================== */
  async function measurePing() {
    const t0 = performance.now();
    try {
      // Cache-busting HEAD request to our own origin — we only care about the
      // network round-trip, not the response body.
      await fetch(location.pathname + "?_ping=" + Date.now(), { method: "HEAD", cache: "no-store" });
    } catch {
      pingMs = null;
      return;
    }
    pingMs = Math.round(performance.now() - t0);
  }

  /* =====================================================================
     CONSOLE
     ===================================================================== */
  function classifyLine(text) {
    if (/error|severe|exception|fatal/i.test(text)) return "err";
    if (/warn/i.test(text)) return "warn";
    if (/^>|^\/|^\$/.test(text)) return "cmd";
    return "info";
  }

  function appendLines(lines) {
    const term = document.getElementById("terminal");
    const atBottom = term.scrollHeight - term.scrollTop - term.clientHeight < 40;
    const frag = document.createDocumentFragment();
    lines.forEach(l => {
      const span = document.createElement("span");
      span.className = "ln " + classifyLine(l.text);
      const ts = l.ts ? `<span class="ts">[${l.ts}]</span> ` : "";
      span.innerHTML = ts + escapeHtml(l.text);
      frag.appendChild(span);
    });
    term.appendChild(frag);
    if (atBottom) term.scrollTop = term.scrollHeight;
  }

  async function loadConsole(reset = false) {
    if (reset) { document.getElementById("terminal").innerHTML = ""; consoleSeq = 0; }
    try {
      const data = await api("/console?after=" + consoleSeq);
      if (data.lines && data.lines.length) { appendLines(data.lines); consoleSeq = data.last ?? consoleSeq; }
    } catch (ex) { if (ex.message === "unreachable") forceLogout(); /* else keep polling */ }
  }

  async function sendCommand() {
    const input = document.getElementById("cmdInput");
    const cmd = input.value.trim();
    if (!cmd) return;
    input.value = "";
    appendLines([{ ts: nowTime(), text: "> " + cmd }]);
    try {
      await api("/command", { method: "POST", body: { command: cmd } });
    } catch (ex) { if (ex.message === "unreachable") forceLogout(); else toast("Could not send command.", true); }
  }

  /* =====================================================================
     POWER ACTIONS
     ===================================================================== */
  const ACTIONS = { start: "Start", stop: "Stop", restart: "Restart", kill: "Kill" };
  async function power(action) {
    if ((action === "stop" || action === "kill") && !confirm(`Really ${ACTIONS[action].toLowerCase()} the server?`)) return;
    try {
      await api("/" + action, { method: "POST" });
      toast(`${ACTIONS[action]} executed.`);
      appendLines([{ ts: nowTime(), text: `> ${ACTIONS[action]} requested…` }]);
      setTimeout(loadStatus, 400);
    } catch (ex) { if (ex.message === "unreachable") forceLogout(); else toast(`${ACTIONS[action]} failed.`, true); }
  }

  /* =====================================================================
     BACKUPS
     ===================================================================== */
  async function loadBackups() {
    let list;
    try { list = await api("/backups"); }
    catch (ex) { if (ex.message === "unreachable") forceLogout(); return; }
    const grid = document.getElementById("backupGrid");
    if (!list.length) { grid.innerHTML = `<p class="muted">No backups yet.</p>`; return; }
    grid.innerHTML = list.map(b => `
      <div class="backup-card">
        <div class="bc-head">
          <span class="ok"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg></span>
          ${escapeHtml(b.name)}
        </div>
        <div class="bc-body">
          <div class="disk">
            <svg viewBox="0 0 24 24" fill="var(--panel-2)" stroke="currentColor" stroke-width="1.5"><path d="M5 3h11l3 3v15H5z"/><path d="M8 3v5h6V3M8 14h8v5H8z" fill="none"/></svg>
          </div>
          <div class="meta">
            <div class="name">${escapeHtml(b.name)}</div>
            <div class="row">📁 ${escapeHtml(b.size || "—")}</div>
            <div class="row">🕑 ${fmtDate(b.created)}</div>
            <div class="row cmd mono">&gt;_ ${escapeHtml(b.id)}</div>
          </div>
        </div>
        <div class="bc-actions">
          <button class="btn btn-green"  data-bk="restore"  data-id="${b.id}" title="Restore">↺</button>
          <button class="btn btn-orange" data-bk="download" data-id="${b.id}" title="Download">⭳</button>
          <button class="btn btn-red"    data-bk="delete"   data-id="${b.id}" title="Delete">🗑</button>
        </div>
      </div>`).join("");

    grid.querySelectorAll("[data-bk]").forEach(btn =>
      btn.addEventListener("click", () => backupAction(btn.dataset.bk, btn.dataset.id)));
  }

  async function backupAction(kind, id) {
    try {
      if (kind === "download") {
        // Opened in a new tab, so the Bearer header cannot be set — pass the
        // token as a query param; the backend accepts it for downloads only.
        window.open(API + "/backups/" + id + "/download?token=" + encodeURIComponent(token), "_blank");
        return;
      }
      if (kind === "delete") {
        if (!confirm("Really delete this backup?")) return;
        await api("/backups/" + id, { method: "DELETE" });
        toast("Backup deleted.");
      }
      if (kind === "restore") {
        if (!confirm("Restore this backup? The server will be restarted.")) return;
        await api("/backups/" + id + "/restore", { method: "POST" });
        toast("Restore started.");
      }
      loadBackups();
    } catch (ex) { if (ex.message === "unreachable") forceLogout(); else toast("Action failed.", true); }
  }

  async function createBackup() {
    const btn = document.getElementById("createBackup");
    btn.disabled = true; btn.textContent = "Creating…";
    try {
      await api("/backups", { method: "POST" });
      toast("Backup is being created.");
      loadBackups();
    } catch (ex) { if (ex.message === "unreachable") forceLogout(); else toast("Backup failed.", true); }
    finally { btn.disabled = false; btn.textContent = "＋ Create backup"; }
  }

  /* Lightweight canvas sparkline, no library */
  function drawChart(id, data, max, color) {
    const cv = document.getElementById(id);
    const dpr = window.devicePixelRatio || 1;
    const w = cv.clientWidth, h = cv.clientHeight || 150;
    cv.width = w * dpr; cv.height = h * dpr;
    const ctx = cv.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);
    if (!data.length) return;
    const pad = 6, top = pad, bottom = h - pad;
    const mx = max || Math.max(...data, 1);
    const stepX = data.length > 1 ? (w - pad * 2) / (data.length - 1) : 0;
    const yOf = v => bottom - (Math.min(v, mx) / mx) * (bottom - top);

    // Grid
    ctx.strokeStyle = "rgba(255,255,255,.05)";
    ctx.lineWidth = 1;
    for (let i = 0; i <= 3; i++) { const y = top + (bottom - top) * i / 3; ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w - pad, y); ctx.stroke(); }

    // Area
    ctx.beginPath();
    data.forEach((v, i) => { const x = pad + i * stepX; i ? ctx.lineTo(x, yOf(v)) : ctx.moveTo(x, yOf(v)); });
    ctx.lineTo(pad + (data.length - 1) * stepX, bottom);
    ctx.lineTo(pad, bottom);
    ctx.closePath();
    ctx.fillStyle = hexA(color, .12);
    ctx.fill();

    // Line
    ctx.beginPath();
    data.forEach((v, i) => { const x = pad + i * stepX; i ? ctx.lineTo(x, yOf(v)) : ctx.moveTo(x, yOf(v)); });
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = "round"; ctx.stroke();

    // Points
    ctx.fillStyle = color;
    data.forEach((v, i) => { const x = pad + i * stepX; ctx.beginPath(); ctx.arc(x, yOf(v), 2.2, 0, Math.PI * 2); ctx.fill(); });
  }

  /* =====================================================================
     HELPERS
     ===================================================================== */
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
  function nowTime() { return new Date().toTimeString().slice(0, 8); }
  function fmtDate(d) { if (!d) return "—"; const t = new Date(d); return isNaN(t) ? String(d) : t.toLocaleString("en-GB"); }
  function hexA(hex, a) { const n = parseInt(hex.slice(1), 16); return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`; }

  /* =====================================================================
     BOOTSTRAP
     ===================================================================== */
  function boot() {
    initLogin();
    const saved = localStorage.getItem(TOKEN_KEY);
    if (saved) {
      token = saved;
      // Verify the saved token against the API before entering the app.
      // On 401 -> back to login; if the API is unreachable -> clear message.
      api("/status")
        .then(() => enterApp())
        .catch(err => {
          if (err.message === "unreachable") logout("Server not reachable. Please try again later.");
          else logout();   // unauthorized / other -> silent return to login
        });
    }
  }

  return { boot };
})();

document.addEventListener("DOMContentLoaded", App.boot);
</script>
